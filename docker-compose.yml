services:
  mysql:
    image: mysql:8.4
    container_name: aicapstone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: inspection_db
      TZ: Asia/Seoul
    # 호스트에 MySQL이 이미 3306을 쓰는 경우가 많아 3307로 노출 (컨테이너 내부는 3306)
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pyour_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: aicapstone-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inspection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: your_password
      # inference-service 호출용 내부 URL (도커 네트워크 안에서 서비스명으로 접근)
      INFERENCE_SERVICE_URL: http://inference-service:8000
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

  inference-service:
    build:
      context: ./inference-service
    container_name: aicapstone-inference-service
    environment:
      TZ: Asia/Seoul
      DEFECT_INFER_ON_FULL_DESKEW: "true"
      YOLO_PREDICT_IMGSZ: "1024"
      YOLO_DEFECT_CONFIDENCE_THRESHOLD: "0.15"
    ports:
      - "8000:8000"
    volumes:
      # 학습된 가중치를 외부에서 교체 가능하도록 마운트
      - ./inference-service/weights:/app/weights

  frontend:
    build:
      context: ./frontend
    container_name: aicapstone-frontend
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"

volumes:
  mysql_data:
