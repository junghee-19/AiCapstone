spring:
  application:
    name: inspection-server

  datasource:
    url: jdbc:mysql://mysql:3306/inspection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 개발 중: update / 운영: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 30MB           # 단일 파일 최대 (PNG·고해상도 PCB 사진 대응)
      max-request-size: 30MB

server:
  address: 0.0.0.0
  port: 8080

logging:
  level:
    com.inspection: DEBUG
    org.springframework.web: INFO

inspection:
  # 검사 캡처 이미지 저장 디렉토리 (도커 볼륨으로 호스트에 매핑)
  image-storage-dir: ${INSPECTION_IMAGE_DIR:/var/inspection-images}
  # 라벨링/학습용 원본 이미지 저장 디렉토리 (검사 이력 이미지와 분리)
  dataset-image-storage-dir: ${DATASET_IMAGE_DIR:/var/dataset-images}
